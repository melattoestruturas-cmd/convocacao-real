<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo Surpresa da Sogra</title>
<style>
  :root{
    --bg1:#4d0f75;
    --bg2:#16051f;
    --gold:#ffd54a;
    --pink:#ff4fa3;
    --panel:#210b31;
    --white:#fff;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    min-height:100vh;
    font-family:Arial,Helvetica,sans-serif;
    color:#fff;
    background:
      radial-gradient(circle at 20% 0%,#7b1fa2 0%,transparent 35%),
      radial-gradient(circle at 80% 0%,#c2185b 0%,transparent 30%),
      linear-gradient(160deg,var(--bg1),var(--bg2));
    padding:18px;
  }
  .wrap{max-width:900px;margin:auto}
  .setup,.game,.prize{
    background:linear-gradient(180deg,#2e1243,#16091f);
    border:2px solid #ffffff22;
    border-radius:24px;
    box-shadow:0 20px 60px #0008;
    padding:22px;
  }
  h1,h2,p{text-align:center}
  h1{font-size:clamp(30px,6vw,58px);margin:0;color:var(--gold);text-shadow:0 3px 0 #8a5700}
  .subtitle{opacity:.85}
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(190px,1fr));
    gap:12px;
    margin:18px 0;
  }
  .upload{
    padding:12px;
    border-radius:14px;
    background:#ffffff0d;
    border:1px dashed #ffffff55;
  }
  label{display:block;font-weight:bold;margin-bottom:7px}
  input[type=file]{width:100%;font-size:12px}
  input[type=text]{width:100%;padding:10px;border-radius:10px;border:0}
  button{
    border:0;
    border-radius:14px;
    padding:14px 24px;
    font-size:18px;
    font-weight:900;
    cursor:pointer;
  }
  .primary{background:linear-gradient(#ffe67a,#f4b400);color:#2b1b00}
  .secondary{background:#ffffff17;color:#fff;border:1px solid #ffffff33}
  .startrow,.controls{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  .game{display:none;position:relative;overflow:hidden}
  .marquee{
    padding:12px;
    border-radius:16px;
    background:#09030e;
    border:5px dotted var(--gold);
    margin:18px 0;
  }
  .reels{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
    padding:16px;
    background:#08040b;
    border-radius:20px;
    border:4px solid #e0a800;
  }
  .reel{
    aspect-ratio:1/1;
    background:white;
    border-radius:14px;
    overflow:hidden;
    display:grid;
    place-items:center;
    box-shadow:inset 0 0 16px #0004;
  }
  .reel img{
    width:100%;
    height:100%;
    object-fit:cover;
  }
  .reel.spinning img{animation:blurspin .1s linear infinite}
  @keyframes blurspin{
    0%{transform:translateY(-8%) scale(1.12);filter:blur(1px)}
    100%{transform:translateY(8%) scale(1.12);filter:blur(3px)}
  }
  .status{
    min-height:72px;
    display:grid;
    place-items:center;
    text-align:center;
    font-size:clamp(22px,4vw,34px);
    font-weight:900;
    margin:14px 0;
  }
  .win{
    color:var(--gold);
    text-shadow:0 0 14px #ffce00;
    animation:pulse .6s infinite alternate;
  }
  @keyframes pulse{to{transform:scale(1.06)}}
  .collect{display:none;background:linear-gradient(#ff79c6,#e60073);color:white}
  .prize{
    display:none;
    text-align:center;
    margin-top:18px;
    animation:reveal .7s ease-out;
  }
  @keyframes reveal{
    from{opacity:0;transform:scale(.7) rotate(-2deg)}
    to{opacity:1;transform:scale(1)}
  }
  .prize img{
    width:min(560px,100%);
    max-height:65vh;
    object-fit:contain;
    border:8px solid white;
    border-radius:22px;
    box-shadow:0 0 35px #ffd700;
    background:#fff;
  }
  .prize h2{font-size:clamp(28px,6vw,56px);color:var(--gold);margin:10px}
  canvas{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:50;
  }
  .small{font-size:13px;opacity:.75}
  .hidden{display:none}
  @media(max-width:600px){
    body{padding:8px}
    .setup,.game,.prize{padding:14px}
    .reels{gap:7px;padding:9px}
  }
</style>
</head>
<body>
<canvas id="confetti"></canvas>

<div class="wrap">
  <section class="setup" id="setup">
    <h1>🎰 Jogo Surpresa</h1>
    <p class="subtitle">Adicione as fotos, escolha a foto do grande prêmio e comece a brincadeira.</p>

    <div class="grid">
      <div class="upload"><label>Foto 1</label><input class="symbolInput" type="file" accept="image/*"></div>
      <div class="upload"><label>Foto 2</label><input class="symbolInput" type="file" accept="image/*"></div>
      <div class="upload"><label>Foto 3</label><input class="symbolInput" type="file" accept="image/*"></div>
      <div class="upload"><label>Foto 4</label><input class="symbolInput" type="file" accept="image/*"></div>
      <div class="upload"><label>Foto 5</label><input class="symbolInput" type="file" accept="image/*"></div>
      <div class="upload"><label>Foto 6</label><input class="symbolInput" type="file" accept="image/*"></div>
      <div class="upload">
        <label>Foto do grande prêmio</label>
        <input id="prizeInput" type="file" accept="image/*">
      </div>
      <div class="upload">
        <label>Música da revelação</label>
        <input id="musicInput" type="file" accept="audio/*">
      </div>
      <div class="upload">
        <label>Nome da ganhadora</label>
        <input id="winnerName" type="text" value="Sogra">
      </div>
    </div>

    <p class="small">A terceira rodada é programada para dar o grande prêmio. Antes disso, o jogo faz duas rodadas de suspense.</p>

    <div class="startrow">
      <button class="primary" id="startBtn">Começar o jogo</button>
    </div>
  </section>

  <section class="game" id="game">
    <h1>✨ Cassino da Família ✨</h1>
    <div class="marquee">
      <div class="reels">
        <div class="reel"><img id="r1" alt=""></div>
        <div class="reel"><img id="r2" alt=""></div>
        <div class="reel"><img id="r3" alt=""></div>
      </div>
    </div>

    <div class="status" id="status">Aperte o botão para girar!</div>

    <div class="controls">
      <button class="primary" id="spinBtn">🎰 GIRAR</button>
      <button class="collect" id="collectBtn">🎁 RECOLHER PREMIAÇÃO</button>
      <button class="secondary" id="restartBtn">Recomeçar</button>
    </div>
  </section>

  <section class="prize" id="prize">
    <h2 id="prizeTitle">PARABÉNS!</h2>
    <p>Você ganhou o grande prêmio!</p>
    <img id="prizeImg" alt="Foto do grande prêmio">
  </section>
</div>

<audio id="music"></audio>

<script>
const setup = document.getElementById('setup');
const game = document.getElementById('game');
const prize = document.getElementById('prize');
const inputs = [...document.querySelectorAll('.symbolInput')];
const prizeInput = document.getElementById('prizeInput');
const musicInput = document.getElementById('musicInput');
const startBtn = document.getElementById('startBtn');
const spinBtn = document.getElementById('spinBtn');
const collectBtn = document.getElementById('collectBtn');
const restartBtn = document.getElementById('restartBtn');
const statusEl = document.getElementById('status');
const winnerName = document.getElementById('winnerName');
const reels = [document.getElementById('r1'),document.getElementById('r2'),document.getElementById('r3')];
const music = document.getElementById('music');
const prizeImg = document.getElementById('prizeImg');
const prizeTitle = document.getElementById('prizeTitle');

let images = [];
let round = 0;
let busy = false;
let ctx;
let audioCtx;

function fileToDataURL(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function placeholder(text, color){
  const c=document.createElement('canvas');
  c.width=500;c.height=500;
  const x=c.getContext('2d');
  x.fillStyle=color;x.fillRect(0,0,500,500);
  x.fillStyle='white';x.font='bold 70px Arial';x.textAlign='center';x.textBaseline='middle';
  x.fillText(text,250,250);
  return c.toDataURL();
}

function beep(freq=440,duration=.12,type='sine',volume=.08){
  audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
  const osc=audioCtx.createOscillator();
  const gain=audioCtx.createGain();
  osc.frequency.value=freq;osc.type=type;
  gain.gain.value=volume;
  osc.connect(gain);gain.connect(audioCtx.destination);
  osc.start();
  gain.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+duration);
  osc.stop(audioCtx.currentTime+duration);
}

function winSound(){
  const notes=[523,659,784,1046,1318];
  notes.forEach((n,i)=>setTimeout(()=>beep(n,.28,'triangle',.13),i*140));
}

async function loadFiles(){
  images=[];
  const colors=['#e91e63','#9c27b0','#3f51b5','#009688','#ff9800','#795548'];
  for(let i=0;i<inputs.length;i++){
    const file=inputs[i].files[0];
    images.push(file ? await fileToDataURL(file) : placeholder('FOTO '+(i+1),colors[i]));
  }
  prizeImg.src = prizeInput.files[0]
    ? await fileToDataURL(prizeInput.files[0])
    : placeholder('GRANDE PRÊMIO','#d4af37');
  if(musicInput.files[0]) music.src=URL.createObjectURL(musicInput.files[0]);
}

startBtn.onclick=async()=>{
  await loadFiles();
  setup.style.display='none';
  game.style.display='block';
  reels.forEach((r,i)=>r.src=images[i]);
  round=0;
  statusEl.textContent='Aperte o botão para girar!';
};

spinBtn.onclick=()=>{
  if(busy)return;
  busy=true;
  spinBtn.disabled=true;
  collectBtn.style.display='none';
  statusEl.className='status';
  statusEl.textContent='Girando...';
  document.querySelectorAll('.reel').forEach(x=>x.classList.add('spinning'));

  let ticks=0;
  const timer=setInterval(()=>{
    reels.forEach(r=>r.src=images[Math.floor(Math.random()*images.length)]);
    beep(250+ticks*12,.05,'square',.025);
    ticks++;
    if(ticks>=20){
      clearInterval(timer);
      document.querySelectorAll('.reel').forEach(x=>x.classList.remove('spinning'));
      round++;

      if(round>=3){
        const winner=images[0];
        reels.forEach(r=>r.src=winner);
        setTimeout(bigWin,400);
      }else{
        let a=Math.floor(Math.random()*images.length);
        let b=(a+1)%images.length;
        let c=(a+2)%images.length;
        reels[0].src=images[a]; reels[1].src=images[b]; reels[2].src=images[c];
        statusEl.textContent=round===1?'Quase! Tente mais uma vez 😄':'Foi por pouco! Agora vai!';
        spinBtn.disabled=false;
        busy=false;
      }
    }
  },75);
};

function bigWin(){
  const name=winnerName.value.trim() || 'Ganhadora';
  statusEl.className='status win';
  statusEl.innerHTML=`🎉 PARABÉNS, ${name.toUpperCase()}!<br>VOCÊ GANHOU O GRANDE PRÊMIO! 🎉`;
  spinBtn.style.display='none';
  collectBtn.style.display='inline-block';
  collectBtn.animate([
    {transform:'scale(1)'},
    {transform:'scale(1.12)'},
    {transform:'scale(1)'}
  ],{duration:700,iterations:Infinity});
  winSound();
  launchConfetti();
  busy=false;
}

collectBtn.onclick=()=>{
  const name=winnerName.value.trim() || 'Sogra';
  prizeTitle.textContent=`🎊 PARABÉNS, ${name.toUpperCase()}! 🎊`;
  prize.style.display='block';
  prize.scrollIntoView({behavior:'smooth'});
  launchConfetti(260);
  winSound();
  if(music.src){
    music.currentTime=0;
    music.play().catch(()=>{});
  }
};

restartBtn.onclick=()=>location.reload();

const canvas=document.getElementById('confetti');
ctx=canvas.getContext('2d');
let pieces=[];
function resize(){canvas.width=innerWidth;canvas.height=innerHeight}
addEventListener('resize',resize);resize();

function launchConfetti(count=180){
  for(let i=0;i<count;i++){
    pieces.push({
      x:Math.random()*canvas.width,
      y:-20-Math.random()*200,
      w:5+Math.random()*9,
      h:9+Math.random()*14,
      vx:-2+Math.random()*4,
      vy:2+Math.random()*5,
      rot:Math.random()*6.28,
      vr:-.15+Math.random()*.3,
      hue:Math.random()*360,
      life:180+Math.random()*100
    });
  }
  animateConfetti();
}
let animating=false;
function animateConfetti(){
  if(animating)return;
  animating=true;
  function frame(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;p.vy+=.02;p.life--;
      ctx.save();
      ctx.translate(p.x,p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle=`hsl(${p.hue},90%,60%)`;
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
    });
    pieces=pieces.filter(p=>p.life>0 && p.y<canvas.height+50);
    if(pieces.length)requestAnimationFrame(frame);
    else{animating=false;ctx.clearRect(0,0,canvas.width,canvas.height)}
  }
  frame();
}
</script>
</body>
</html>
